<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Expense</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #222222);
            padding: 20px;
            margin: 0;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            background-color: var(--tg-theme-secondary-bg-color, #f5f5f5);
            color: var(--tg-theme-text-color, #222222);
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h2>New Expense</h2>
    
    <div class="form-group">
        <label for="amount">Amount (€)</label>
        <input type="text" id="amount" inputmode="decimal" placeholder="12,50" required>
    </div>

    <div class="form-group">
        <label for="date">Date (Optional - defaults to today)</label>
        <input type="date" id="date">
    </div>

    <div class="form-group">
        <label for="description">Description</label>
        <input type="text" id="description" placeholder="Lunch with team" required>
    </div>

    <button id="submitBtn">Send to Excel</button>

    <script>
        // Initialize the Telegram WebApp object
        const tg = window.Telegram.WebApp;
        tg.expand(); // Make the form open to full height automatically

        document.getElementById('submitBtn').addEventListener('click', function() {
            const amount = document.getElementById('amount').value.trim();
            const date = document.getElementById('date').value;
            const description = document.getElementById('description').value.trim();

            if (!amount || !description) {
                alert('Please fill out both Amount and Description.');
                return;
            }

            // Package the data into a JSON string
            const payload = {
                date: date || null, // Will send null if left empty (handled by Python as 'today')
                amount: amount,
                description: description
            };

            // This line fires the data back into the Telegram Chat!
            tg.sendData(JSON.stringify(payload));
            tg.close(); // Close the web form window automatically
        });
    </script>
</body>
</html>
