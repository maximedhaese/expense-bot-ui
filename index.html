<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Expense</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #222222);
            padding: 20px;
            margin: 0;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            background-color: var(--tg-theme-secondary-bg-color, #f5f5f5);
            color: var(--tg-theme-text-color, #222222);
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h2>New Expense</h2>
    
    <div class="form-group">
        <label for="amount">Amount (€)</label>
        <input type="text" id="amount" inputmode="decimal" placeholder="12,50" required>
    </div>

    <div class="form-group">
        <label for="date">Date (Optional - defaults to today)</label>
        <input type="date" id="date">
    </div>

    <div class="form-group">
        <label for="description">Description</label>
        <input type="text" id="description" placeholder="Lunch with team" required>
    </div>

    <button id="submitBtn">Send to Excel</button>

    <script>
        // Initialize the Telegram WebApp object
        const tg = window.Telegram.WebApp;
        tg.expand(); // Make the form open to full height automatically

        document.getElementById('submitBtn').addEventListener('click', function() {
            const amount = document.getElementById('amount').value.trim();
            const date = document.getElementById('date').value;
            const description = document.getElementById('description').value.trim();

            // Error Handling
            if (!amount || !description) {
                // Triggers an error vibration and a native Telegram popup
                tg.HapticFeedback.notificationOccurred('error');
                tg.showAlert('Please fill out both Amount and Description.');
                return;
            }

            // --- THE UPGRADE: Visual Feedback ---
            const btn = document.getElementById('submitBtn');
            btn.innerText = "Sending... 🚀";
            btn.disabled = true;           // Prevents double-clicking
            btn.style.opacity = "0.7";     // Dims the button slightly

            // --- THE UPGRADE: Physical Feedback ---
            // Triggers a satisfying 'success' vibration pulse on your phone
            tg.HapticFeedback.notificationOccurred('success');

            // Package the data into a JSON string
            const payload = {
                date: date || null,
                amount: amount,
                description: description
            };

            // --- THE UPGRADE: Pacing ---
            // Wait 600 milliseconds (just over half a second) before closing 
            // so the user actually sees the button change and feels the vibration.
            setTimeout(() => {
                tg.sendData(JSON.stringify(payload));
                tg.close();
            }, 600);
        });
    </script>
</body>
</html>
